<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1050 680" preserveAspectRatio="none">
  <g fill="none" stroke="#ffffff" stroke-opacity="0.55" stroke-width="3.2">
    <!-- Límites del campo -->
    <rect x="26" y="26" width="998" height="628" />
    <!-- Línea de medio campo -->
    <line x1="525" y1="26" x2="525" y2="654" />
    <!-- Círculo central + punto -->
    <circle cx="525" cy="340" r="96" />
    <circle cx="525" cy="340" r="4" fill="#ffffff" fill-opacity="0.55" stroke="none" />

    <!-- Área grande izquierda -->
    <rect x="26" y="135" width="168" height="410" />
    <!-- Área chica izquierda -->
    <rect x="26" y="245" width="56" height="190" />
    <!-- Punto penal izquierdo -->
    <circle cx="140" cy="340" r="4" fill="#ffffff" fill-opacity="0.55" stroke="none" />
    <!-- Arco del área izquierda (la "D") -->
    <path d="M194,266 A96,96 0 0 1 194,414" />

    <!-- Área grande derecha -->
    <rect x="856" y="135" width="168" height="410" />
    <!-- Área chica derecha -->
    <rect x="968" y="245" width="56" height="190" />
    <!-- Punto penal derecho -->
    <circle cx="910" cy="340" r="4" fill="#ffffff" fill-opacity="0.55" stroke="none" />
    <!-- Arco del área derecha -->
    <path d="M856,266 A96,96 0 0 0 856,414" />

    <!-- Arcos de esquina -->
    <path d="M40,26 A14,14 0 0 1 26,40" />
    <path d="M1010,26 A14,14 0 0 0 1024,40" />
    <path d="M26,640 A14,14 0 0 1 40,654" />
    <path d="M1024,640 A14,14 0 0 0 1010,654" />
  </g>
</svg>
